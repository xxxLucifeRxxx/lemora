name: lemora
description: Language learning app with flashcards, spaced repetition, and AI assistance.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  # Flutter and localization.
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State management.
  bloc: ^9.2.1
  flutter_bloc: ^9.1.1

  # Local persistence.
  drift: ^2.34.0
  drift_flutter: ^0.3.0

  # Models and utilities.
  collection: ^1.19.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  uuid: ^4.5.3

  # Logging and diagnostics.
  talker: ^5.1.17
  talker_flutter: ^5.1.17

  # UI and theming.
  fl_chart: ^1.2.0
  flutter_svg: ^2.3.0
  theme_tailor_annotation: ^3.1.3

dev_dependencies:
  # Testing.
  flutter_test:
    sdk: flutter
  bloc_test: ^10.0.0
  mocktail: ^1.0.5

  # Code generation.
  build_runner: ^2.15.0
  drift_dev: ^2.34.0
  freezed: 3.2.5
  json_serializable: ^6.14.0
  theme_tailor: ^3.1.3

  # Localization generation.
  sheety_localization: ^0.4.2

  # Static analysis.
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
